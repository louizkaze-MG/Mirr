<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesan & Pesan Untukku ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1484d4 0%, #ece2e6 100%);
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .container { width: 90%; max-width: 400px; }
        .card {
            background: rgb(13, 130, 240); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; color: white;
        }
        h2 { color: #cef4fd; margin-bottom: 15px; }
        p { font-size: 0.9rem; margin-bottom: 20px; opacity: 0.9; }
        textarea {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            outline: none; font-family: inherit; resize: none; box-sizing: border-box;
            margin-bottom: 15px; transition: 0.3s;
        }
        textarea:focus { box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        button {
            background: #1e54e9; color: white; border: none; padding: 12px;
            border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%;
            transition: 0.3s; font-size: 1rem;
        }
        button:hover { background: #ad1457; transform: scale(1.02); }
        .back-nav { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .back-link { text-decoration: none; color: white; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>💌 Kesan & Pesan</h2>
            <p>Tuliskan semua yang ingin kamu sampaikan ke aku ya sayang... Aku bakal baca semuanya. ❤️</p>
            
            <textarea id="isiPesan" rows="6" placeholder="Tulis di sini..."></textarea>
            
            <button onclick="kirimWA()">
                <i class="fab fa-whatsapp"></i> Kirim ke WhatsApp Aku
            </button>

            <div class="back-nav">
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Kembali ke Home
                </a>
            </div>
        </div>
    </div>

    <script>
        function kirimWA() {
            const pesan = document.getElementById('isiPesan').value;
            const nomorWA = "6281227884330"; // GANTI DENGAN NOMOR WA KAMU (Awali 62)

            if (pesan.trim() === "") {
                alert("Isi dulu pesannya ya sayang... 😊");
                return;
            }

            const teksWA = encodeURIComponent("Halo sayang, ini kesan & pesan aku buat kamu: \n\n" + pesan);
            window.open(`https://wa.me/${nomorWA}?text=${teksWA}`, '_blank');
        }
    </script>
</body>
</html>
